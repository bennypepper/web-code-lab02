<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
</head>
<body>

    <h2 align="center">Create Account</h2>
    
    <form>
        <table align="center" cellpadding="10">
            <tr>
                <td><input type="text" placeholder="First Name" size="25"></td>
                <td><input type="text" placeholder="Last Name" size="25"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <select style="width: 100%; padding: 3px;">
                        <option value="" disabled selected>Country</option>
                        <option value="id">Indonesia</option>
                        <option value="jp">Japan</option>
                        <option value="kr">South Korea</option>
                        <option value="cn">China</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><input type="email" placeholder="Email Address" size="25"></td>
                <td><input type="tel" placeholder="Phone Number" size="25"></td>
            </tr>
            <tr>
                <td><input type="password" placeholder="Password" size="25"></td>
                <td><input type="password" placeholder="Confirm Password" size="25"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms">Terms and Condition</label>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Create" style="background-color: #3b5998; color: white; padding: 10px 40px; border: none; border-radius: 5px;">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>

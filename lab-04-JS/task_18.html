<!DOCTYPE html>
<html>
<head><title>Task 18</title></head>
<body>
<script>
    let sum = 0;
    let input = parseInt(prompt("Enter a number (-1 to stop):"));
    while (input !== -1) {
        sum += input;
        input = parseInt(prompt("Enter a number (-1 to stop):"));
    }
    console.log("Total sum: " + sum);
</script>
</body>
</html>

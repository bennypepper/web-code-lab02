<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 40 - Random Quote Generator</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        #quote-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin-bottom: 20px;
        }
        #quote {
            font-size: 1.5rem;
            font-style: italic;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="quote-container">
        <p id="quote">Click the button to generate a quote.</p>
    </div>
    <button onclick="generateQuote()">Generate Quote</button>

    <script>
        const quotes = [
            "“Programmer: A machine that turns coffee into code.”",
            "“Computers are fast; programmers keep it slow.”",
            "“When I wrote this code, only God and I understood what I did. Now only God knows.”",
            "“A son asked his father (a programmer) why the sun rises in the east, and sets in the west. His response? It works, don’t touch!”",
            "“Measuring programming progress by lines of code is like measuring aircraft building progress by weight.”",
            "“In a room full of top software designers, if two agree on the same thing, that’s a majority.”",
            "“One: Demonstrations always crash. And two: The probability of them crashing goes up exponentially with the number of people watching.”",
            "“Programming made the impossible possible. You can have a null object and a constant variable.”",
            "“C makes it easy to shoot yourself in the foot; C++ makes it harder, but when you do, it blows your whole leg off.”",
            "“The evolution of languages: FORTRAN is a nontyped language. C is a weakly typed language. Ada is a strongly typed language. C++ is a strongly hyped language.”"
        ];

        function generateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").textContent = quotes[randomIndex];
        }
    </script>
</body>
</html>

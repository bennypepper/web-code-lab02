<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 43 - Carousel</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
        }

        .carousel-container {
            position: relative;
            width: 80%;
            max-width: 800px;
        }

        img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            background-color: #fff;
            border-radius: 5px;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>

<body>
    <div class="carousel-container">
        <img id="carousel-image" src="" alt="Carousel Image">
    </div>
    <div class="controls">
        <button onclick="changeSlide(-1)">Mundur</button>
        <button onclick="changeSlide(1)">Maju</button>
    </div>

    <script>
        const images = [
            "https://images-assets.nasa.gov/image/art002e000190/art002e000190~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e008487/art002e008487~large.jpg?w=1920&h=1440&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e015231/art002e015231~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e009285/art002e009285~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e009283/art002e009283~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e009566/art002e009566~large.jpg?w=1920&h=1440&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e009302/art002e009302~large.jpg?w=1920&h=1440&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/jsc2026e020490/jsc2026e020490~large.jpg?w=1920&h=1279&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e014066/art002e014066~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/NHQ202604010115/NHQ202604010115~large.jpg?w=1919&h=924&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/NHQ202604010308/NHQ202604010308~large.jpg?w=1920&h=1380&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/NHQ202604010263/NHQ202604010263~large.jpg?w=1919&h=980&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/SLS_MAF_20260401_Artemis%20II%20Launch-317/SLS_MAF_20260401_Artemis%20II%20Launch-317~large.jpg?w=1920&h=1261&fit=clip&crop=faces%2Cfocalpoint",
            "https://images-assets.nasa.gov/image/art002e015967/art002e015967~large.jpg?w=1920&h=1280&fit=clip&crop=faces%2Cfocalpoint"
        ];
        let index = 0;
        const imgElement = document.getElementById("carousel-image");
        imgElement.src = images[index];

        function changeSlide(direction) {
            index += direction;
            if (index >= images.length) {
                index = 0;
            } else if (index < 0) {
                index = images.length - 1;
            }
            imgElement.src = images[index];
        }
    </script>
</body>

</html>
